<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Topup Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body {
    font-family: 'Kanit', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.5s;
}
.main-card {
    background: rgba(15,23,42,0.6);
    backdrop-filter: blur(20px);
    border-radius:2rem;
    padding:2rem;
    max-width:800px;
    width:100%;
    color:#fff;
}
.package-card {
    background: rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:1.5rem;
    padding:1rem;
    text-align:center;
    cursor:pointer;
    transition:0.3s;
    position:relative;
}
.package-card:hover {
    transform:translateY(-5px) scale(1.03);
    background:rgba(59,130,246,0.15);
}
.package-card.selected {
    border-color:#3b82f6;
    box-shadow:0 10px 20px rgba(59,130,246,0.3);
}
.check {
    position:absolute;
    top:-6px;
    right:-6px;
    background:#3b82f6;
    width:20px;
    height:20px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
}
.package-card.selected .check {opacity:1;}
.fade {transition:0.4s;}
.hidden {display:none;}
input {
    width:100%;
    padding:10px;
    border-radius:12px;
    background:rgba(0,0,0,0.3);
    border:1px solid rgba(255,255,255,0.1);
}
button:disabled {opacity:0.5;}
</style>
</head>
<body>

<div class="main-card">

<!-- STEP 1 -->
<div id="step1" class="fade">
<h1 class="text-3xl text-center font-bold mb-4">Nexus Topup</h1>

<input id="uid" placeholder="Game UID (8 หลักขึ้นไป)" class="mb-3">
<p id="uidErr" class="text-red-400 text-sm hidden">UID ไม่ถูกต้อง</p>

<div id="grid" class="grid grid-cols-2 gap-3 mb-5"></div>

<button id="next" class="w-full bg-blue-600 py-2 rounded-lg" disabled>ถัดไป</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="fade hidden">
<h2 class="text-xl font-bold mb-3">สรุป</h2>

<p>UID: <span id="s_uid"></span></p>
<p>แพ็กเกจ: <span id="s_pkg"></span></p>
<p class="mb-3">รวม: <span id="s_total"></span> บาท</p>

<input id="link" placeholder="ลิงก์อั่งเปา TrueMoney">
<p id="linkErr" class="text-red-400 text-sm hidden">ลิงก์ต้องเป็น https://gift.truemoney.com</p>

<button id="send" class="w-full bg-green-600 py-2 rounded-lg mt-3">ส่งคำสั่งซื้อ</button>
</div>

</div>

<script>
const packages=[
["33 💎",11],["68 💎",21],["172 💎",52],
["310 💎",90],["512 💎",150],["690 💎",200],
["1052 💎",300],["1801 💎",500],["3698 💎",1000]
];

const WEBHOOK="https://discord.com/api/webhooks/1372904210370265259/p-Z-klz9ywB-WpHuvrPCjPRt23me00hA_cC2Jh1XHLtNUvLHFG0c4khAbWe4jGO04s-k";

let selected=new Set();

const grid=document.getElementById('grid');
packages.forEach((p,i)=>{
    let div=document.createElement('div');
    div.className='package-card';
    div.innerHTML=`<div class="check">✓</div>${p[0]}<br>฿${p[1]}`;
    div.onclick=()=>{
        selected.has(i)?selected.delete(i):selected.add(i);
        update();
    };
    grid.appendChild(div);
});

function update(){
    [...grid.children].forEach((c,i)=>{
        c.classList.toggle('selected',selected.has(i));
    });
    validate();
}

const uid=document.getElementById('uid');
const next=document.getElementById('next');

function validate(){
    next.disabled = !(uid.value.length>=8 && selected.size>0);
}

uid.oninput=()=>{
    document.getElementById('uidErr').classList.toggle('hidden',uid.value.length>=8);
    validate();
};

next.onclick=()=>{
    step1.classList.add('hidden');
    step2.classList.remove('hidden');
    document.body.style.background="linear-gradient(135deg,#1e293b,#020617)";

    s_uid.innerText=uid.value;
    let names=[...selected].map(i=>packages[i][0]).join(', ');
    s_pkg.innerText=names;

    let total=[...selected].reduce((a,i)=>a+packages[i][1],0);
    s_total.innerText=total;
};

send.onclick=async()=>{
    let link=document.getElementById('link').value.trim();

    if(!link.startsWith("https://gift.truemoney.com")){
        linkErr.classList.remove('hidden');
        return;
    }
    linkErr.classList.add('hidden');

    let total=[...selected].reduce((a,i)=>a+packages[i][1],0);
    let list=[...selected].map(i=>`${packages[i][0]} (฿${packages[i][1]})`).join("\n");

    await fetch(WEBHOOK,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            embeds:[{
                title:"🛒 New Order",
                color:5814783,
                fields:[
                    {name:"UID",value:uid.value,inline:true},
                    {name:"Total",value:total+" บาท",inline:true},
                    {name:"Packages",value:list},
                    {name:"Gift Link",value:link}
                ]
            }]
        })
    });

    alert("ส่งเรียบร้อย!");
};
</script>

</body>
</html>
