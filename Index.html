<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Topup - ระบบเติมเกม</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  body { 
    font-family: 'Kanit', sans-serif; 
    background: radial-gradient(circle at top left, #1e293b, #020617); 
    min-height:100vh; 
    margin:0; 
    display:flex; 
    justify-content:center; 
    align-items:center; 
    transition: background 0.5s ease;
  }
  .glass-card {
    background: rgba(30,41,59,0.7);
    backdrop-filter: blur(12px);
    border-radius: 1.5rem;
    padding: 2rem;
    width:100%;
    max-width:600px;
  }
  .package-card {
    cursor:pointer;
    border:2px solid transparent;
    border-radius:1rem;
    padding:1rem;
    transition:0.2s;
  }
  .package-card:hover { transform: translateY(-3px); border-color:#6366f1; background:rgba(99,102,241,0.1);}
  .package-card.selected { border-color:#6366f1; background:rgba(99,102,241,0.2);}
  .btn { background:linear-gradient(135deg,#6366f1,#4f46e5); color:white; padding:.75rem 1rem; border-radius:1rem; font-weight:bold; cursor:pointer; transition:0.3s;}
  .btn:disabled { opacity:0.6; cursor:not-allowed;}
  .input-field { padding:.75rem 1rem; border-radius:1rem; border:2px solid rgba(255,255,255,0.1); background:rgba(15,23,42,0.6); color:white; width:100%; margin-bottom:.5rem;}
  .input-field:focus { outline:none; border-color:#6366f1; box-shadow:0 0 0 4px rgba(99,102,241,0.2);}
  .hidden { display:none; }
</style>
</head>
<body>

<div class="glass-card" id="step1">
  <h2 class="text-2xl font-bold mb-4">เลือกแพ็กเกจ</h2>
  <div id="packageGrid" class="grid grid-cols-2 gap-3 mb-4">
    <!-- แพ็กเกจจะถูกสร้างด้วย JS -->
  </div>
  <input type="text" id="uidInput" class="input-field" placeholder="กรอก UID 8 หลักขึ้นไป">
  <p id="uidError" class="text-red-400 text-sm hidden">UID ต้องมีอย่างน้อย 8 หลัก</p>
  <button id="toPayment" class="btn w-full mt-3" disabled>ไปหน้าจ่ายเงิน</button>
</div>

<div class="glass-card hidden" id="step2">
  <h2 class="text-2xl font-bold mb-4">ชำระเงิน</h2>
  <p class="mb-2">รายการที่เลือก:</p>
  <ul id="summaryList" class="mb-4"></ul>
  <p class="mb-2">ยอดรวม: <span id="totalAmount"></span> บาท</p>
  <input type="text" id="tmLink" class="input-field" placeholder="วางลิ้ง TrueMoney Wallet / อั่งเปา">
  <p id="tmError" class="text-red-400 text-sm hidden">กรุณาใส่ลิ้งที่ถูกต้อง</p>
  <button id="submitOrder" class="btn w-full mt-3" disabled>ส่งคำสั่งซื้อ</button>
</div>

<script>
  lucide.createIcons();

  const packages = [
    {name:"33 Diamonds", price:11},
    {name:"68 Diamonds", price:21},
    {name:"172 Diamonds", price:52},
    {name:"310 Diamonds", price:90},
    {name:"512 Diamonds", price:150},
    {name:"690 Diamonds", price:200},
    {name:"1,052 Diamonds", price:300},
    {name:"1,801 Diamonds", price:500},
    {name:"3,698 Diamonds", price:1000}
  ];

  const packageGrid = document.getElementById("packageGrid");
  const uidInput = document.getElementById("uidInput");
  const uidError = document.getElementById("uidError");
  const toPayment = document.getElementById("toPayment");
  const step1 = document.getElementById("step1");
  const step2 = document.getElementById("step2");
  const summaryList = document.getElementById("summaryList");
  const totalAmount = document.getElementById("totalAmount");
  const tmLink = document.getElementById("tmLink");
  const tmError = document.getElementById("tmError");
  const submitOrder = document.getElementById("submitOrder");

  const WEBHOOK_URL = "https://discord.com/api/webhooks/1372904210370265259/p-Z-klz9ywB-WpHuvrPCjPRt23me00hA_cC2Jh1XHLtNUvLHFG0c4khAbWe4jGO04s-k";

  let selectedPackages = [];

  function renderPackages(){
    packageGrid.innerHTML = "";
    packages.forEach((pkg, i)=>{
      const div = document.createElement("div");
      div.className="package-card";
      div.innerHTML=`<div class="text-white font-bold">${pkg.name}</div><div class="text-green-400 font-semibold">${pkg.price} บาท</div>`;
      div.onclick=()=>{
        if(selectedPackages.includes(i)){ selectedPackages = selectedPackages.filter(x=>x!==i); div.classList.remove("selected"); }
        else { selectedPackages.push(i); div.classList.add("selected"); }
        validateStep1();
      };
      packageGrid.appendChild(div);
    });
  }

  function validateStep1(){
    const uidValid = /^\d{8,}$/.test(uidInput.value);
    if(!uidValid && uidInput.value.length>0) uidError.classList.remove("hidden");
    else uidError.classList.add("hidden");
    toPayment.disabled = !(uidValid && selectedPackages.length>0);
  }

  uidInput.addEventListener("input", validateStep1);

  toPayment.onclick = ()=>{
    // เปลี่ยนพื้นหลังเล็กน้อย
    document.body.style.background = "radial-gradient(circle at top right, #4f46e5, #0f172a)";
    // แสดงหน้าจ่ายเงิน
    step1.classList.add("hidden");
    step2.classList.remove("hidden");

    // แสดงสรุปรายการ
    summaryList.innerHTML = selectedPackages.map(i=>`<li>${packages[i].name} - ${packages[i].price} บาท</li>`).join("");
    totalAmount.innerText = selectedPackages.reduce((sum,i)=>sum+packages[i].price,0);

    validateStep2();
  };

  function validateStep2(){
    const url = tmLink.value.trim();
    // ตรวจสอบว่าลิ้งเริ่มด้วย https:// หรือ tm.me หรือ truemoney
    const urlValid = /^https?:\/\/.+/.test(url);
    tmError.classList.toggle("hidden", urlValid || url==="");
    submitOrder.disabled = !(urlValid && selectedPackages.length>0 && /^\d{8,}$/.test(uidInput.value));
  }

  tmLink.addEventListener("input", validateStep2);

  submitOrder.onclick = async ()=>{
    const uid = uidInput.value.trim();
    const tm = tmLink.value.trim();
    const items = selectedPackages.map(i=>`${packages[i].name} (${packages[i].price} บาท)`).join("\n");
    const total = selectedPackages.reduce((sum,i)=>sum+packages[i].price,0);

    const payload = { content:`📥 New Order\nUID: ${uid}\nPackages:\n${items}\nTotal: ${total} บาท\nPayment Link: ${tm}` };

    try {
      await fetch(WEBHOOK_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
      alert("ส่งคำสั่งซื้อเรียบร้อยแล้ว!");
      location.reload();
    } catch {
      alert("เกิดข้อผิดพลาดในการส่งข้อมูล!");
    }
  };

  renderPackages();
</script>

</body>
</html>
